<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บัตรสะสมแต้ม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Kanit', sans-serif; }
        .reward-card {
            background: linear-gradient(135deg, #00b900 0%, #009900 100%);
            color: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .point-circle {
            width: 60px;
            height: 60px;
            background: white;
            color: #00b900;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin: 10px auto;
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="reward-card">
            <h2 id="userName">กำลังโหลด...</h2>
            <p>คะแนนสะสมของคุณ</p>
            <div class="point-circle" id="userPoints">0</div>
            <p>สะสมครบ 10 แต้ม รับฟรี! กาแฟ 1 แก้ว</p>
        </div>

        <div class="mt-4">
            <button class="btn btn-success w-100 mb-2" onclick="scanQR()">สแกนเพื่อรับแต้ม</button>
            <button class="btn btn-outline-secondary w-100" onclick="liff.closeWindow()">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="script.js"></script>
</body>
</html>
